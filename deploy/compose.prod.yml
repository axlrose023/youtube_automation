name: youtube-automation

x-app-base: &app-base
  build:
    context: ../backend
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - ./backend.env
  environment:
    UV_CACHE_DIR: /tmp/uv-cache
  volumes:
    - ../artifacts:/app/artifacts
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${YTA_PUBLIC_HTTP_BIND:-0.0.0.0}:${YTA_PUBLIC_HTTP_PORT:-80}:80"
      - "${YTA_PUBLIC_HTTPS_BIND:-0.0.0.0}:${YTA_PUBLIC_HTTPS_PORT:-443}:443"
    environment:
      YTA_SERVER_NAME: ${YTA_SERVER_NAME:-_}
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    <<: *app-base
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://127.0.0.1:8000/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  migrator:
    <<: *app-base
    command: ["cli", "upgrade"]
    restart: "no"

  scheduler:
    <<: *app-base
    command: ["taskiq", "scheduler", "app.tiq:scheduler", "app.tasks"]
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  worker_browser:
    build:
      context: ../backend
      dockerfile: Dockerfile.emulation
    restart: unless-stopped
    env_file:
      - ./backend.env
    environment:
      UV_CACHE_DIR: /tmp/uv-cache
      TASKIQ_QUEUE_NAME: ${TASKIQ_EMULATION_QUEUE_NAME:-taskiq_emulation}
    command: ["uv", "run", "taskiq", "worker", "app.tiq:broker", "-w", "1", "app.tasks"]
    volumes:
      - ../artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      disable: true

  worker_analysis:
    build:
      context: ../backend
      dockerfile: Dockerfile.analysis
    restart: unless-stopped
    env_file:
      - ./backend.env
    environment:
      UV_CACHE_DIR: /tmp/uv-cache
      TASKIQ_QUEUE_NAME: ${TASKIQ_ANALYSIS_QUEUE_NAME:-taskiq_analysis}
    command: ["taskiq", "worker", "app.tiq:broker", "-w", "2", "app.tasks"]
    volumes:
      - ../artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      disable: true

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
      - ./backend.env
    environment:
      POSTGRES_USER: ${APP__POSTGRES__USER}
      POSTGRES_PASSWORD: ${APP__POSTGRES__PASSWORD}
      POSTGRES_DB: ${APP__POSTGRES__DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${APP__POSTGRES__EXTERNAL_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP__POSTGRES__USER} -d ${APP__POSTGRES__DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: eqalpha/keydb:latest
    restart: unless-stopped
    command: ["keydb-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${APP__REDIS__EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
